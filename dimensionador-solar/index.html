<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dimensionador Solar IA – RV Energía</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#080B14;
  --bg2:#0C1120;
  --bg-elev:#0F1525;
  --card:#121829;
  --card2:#171E33;
  --card-hover:#1B2340;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.10);
  --border-strong:rgba(255,255,255,0.16);
  --accent:#4D7BFF;
  --accent-hover:#6B8FFF;
  --accent-soft:rgba(77,123,255,0.12);
  --accent-ring:rgba(77,123,255,0.25);
  --lime:#B8F32D;
  --lime-soft:rgba(184,243,45,0.10);
  --accent2:#B8F32D;
  --accent3:#FBBF24;
  --text:#F2F4F8;
  --text2:#9AA3B8;
  --text3:#5B6478;
  --green:#4ADE80;
  --red:#F87171;
  --yellow:#FBBF24;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.4);
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg:0 20px 60px rgba(0,0,0,0.55);
  --radius:12px;
  --radius-lg:16px;
  --nav-bg:rgba(8,11,20,0.7);
  --grid-line:rgba(255,255,255,0.022);
  --surface-1:rgba(255,255,255,0.025);
  --surface-2:rgba(255,255,255,0.04);
  --surface-3:rgba(255,255,255,0.06);
  --surface-hover:rgba(255,255,255,0.08);
  --scroll-thumb:rgba(255,255,255,0.08);
  --scroll-thumb-hover:rgba(255,255,255,0.16);
}
:root[data-theme="light"]{
  --bg:#FBFCFD;
  --bg2:#F4F6F9;
  --bg-elev:#FFFFFF;
  --card:#FFFFFF;
  --card2:#F7F9FC;
  --card-hover:#F1F4F9;
  --border:#E6E9F0;
  --border2:#D6DBE5;
  --border-strong:#BDC4D2;
  --accent:#1E54E8;
  --accent-hover:#1745CC;
  --accent-soft:rgba(30,84,232,0.10);
  --accent-ring:rgba(30,84,232,0.20);
  --lime:#5BA306;
  --lime-soft:rgba(132,204,22,0.16);
  --accent2:#5BA306;
  --accent3:#B45309;
  --text:#0B1220;
  --text2:#5A6478;
  --text3:#94A0B5;
  --green:#16A34A;
  --red:#DC2626;
  --yellow:#CA8A04;
  --shadow-sm:0 1px 2px rgba(15,30,55,0.05);
  --shadow:0 4px 18px rgba(15,30,55,0.06);
  --shadow-lg:0 20px 50px rgba(15,30,55,0.10);
  --nav-bg:rgba(255,255,255,0.78);
  --grid-line:rgba(15,30,55,0.04);
  --surface-1:rgba(15,30,55,0.025);
  --surface-2:rgba(15,30,55,0.04);
  --surface-3:rgba(15,30,55,0.06);
  --surface-hover:rgba(15,30,55,0.08);
  --scroll-thumb:rgba(15,30,55,0.16);
  --scroll-thumb-hover:rgba(15,30,55,0.28);
}
*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;position:relative;-webkit-font-smoothing:antialiased;font-feature-settings:'cv11','ss01','ss03';letter-spacing:-0.005em}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(circle at 12% -10%,rgba(77,123,255,0.18),transparent 45%),
    radial-gradient(circle at 92% 8%,rgba(184,243,45,0.08),transparent 40%),
    radial-gradient(circle at 50% 110%,rgba(77,123,255,0.12),transparent 55%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.6;
  background-image:
    linear-gradient(var(--grid-line) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:56px 56px;
  -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 40%,#000 50%,transparent 100%);
  mask-image:radial-gradient(ellipse 80% 60% at 50% 40%,#000 50%,transparent 100%);
}
body>*{position:relative;z-index:1}
h1,h2,h3,h4{font-family:'Space Grotesk','Inter',sans-serif;color:var(--text);letter-spacing:-0.028em;font-weight:600}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--scroll-thumb-hover)}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--border2);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--card);box-shadow:0 0 0 4px var(--accent-soft)}
input[type=number],input[type=text],select{background:var(--card);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:10px 12px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s,background .15s}
input:hover,select:hover{border-color:var(--border-strong)}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);background:var(--card2)}
select option{background:var(--card)}
button{cursor:pointer;font-family:'Inter',sans-serif}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-feature-settings:'ss02','zero','cv11';letter-spacing:-0.01em}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:var(--nav-bg);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%)}
.nav-steps{display:flex;gap:4px;align-items:center;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:999px;padding:4px}
.step-pill{padding:7px 14px;border-radius:999px;font-size:12px;font-weight:500;color:var(--text2);background:transparent;transition:all .18s;cursor:pointer;letter-spacing:-0.005em;display:inline-flex;align-items:center;gap:6px;border:0}
.step-pill:hover{color:var(--text)}
.step-pill.active{background:var(--accent);color:#fff;box-shadow:0 0 0 1px rgba(255,255,255,0.06) inset,0 4px 14px rgba(77,123,255,0.35)}
.step-pill.done{color:var(--lime)}
.step-pill.done::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--lime);box-shadow:0 0 8px var(--lime)}
.main{max-width:1280px;margin:0 auto;padding:40px 28px 64px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;transition:border-color .15s,background .15s}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:0.02em;text-transform:uppercase}
.badge-green{background:rgba(74,222,128,0.10);color:var(--green);border:1px solid rgba(74,222,128,0.22)}
.badge-blue{background:var(--accent-soft);color:var(--accent-hover);border:1px solid var(--accent-ring)}
.badge-orange{background:rgba(251,191,36,0.10);color:var(--accent3);border:1px solid rgba(251,191,36,0.22)}
.badge-accent{background:var(--accent-soft);color:var(--accent-hover);border:1px solid var(--accent-ring)}
.badge-purple{background:rgba(251,191,36,0.08);color:var(--accent3);border:1px solid rgba(251,191,36,0.22)}
.badge-gray{background:rgba(255,255,255,0.05);color:var(--text2);border:1px solid var(--border2)}
.badge-lime{background:var(--lime-soft);color:var(--lime);border:1px solid rgba(184,243,45,0.24)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid transparent;transition:all .15s;letter-spacing:-0.005em;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 14px rgba(77,123,255,0.32),0 0 0 1px rgba(255,255,255,0.06) inset}
.btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover);box-shadow:0 6px 22px rgba(77,123,255,0.42),0 0 0 1px rgba(255,255,255,0.10) inset;transform:translateY(-1px)}
.btn-secondary{background:rgba(255,255,255,0.04);color:var(--text);border:1px solid var(--border2);backdrop-filter:blur(8px)}
.btn-secondary:hover{background:rgba(255,255,255,0.08);border-color:var(--border-strong);color:var(--text)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid transparent}
.btn-ghost:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.btn-danger{background:rgba(248,113,113,0.08);color:var(--red);border:1px solid rgba(248,113,113,0.22)}
.btn-danger:hover{background:rgba(248,113,113,0.16)}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px}
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:32px}
.mode-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;cursor:pointer;transition:all .18s cubic-bezier(.4,0,.2,1);text-align:left;position:relative;overflow:hidden}
.mode-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(77,123,255,0.06),transparent 50%);opacity:0;transition:opacity .18s;pointer-events:none}
.mode-card:hover{border-color:var(--border-strong);transform:translateY(-2px)}
.mode-card:hover::before{opacity:1}
.mode-card.active{border-color:var(--accent);background:linear-gradient(180deg,var(--accent-soft),var(--card) 60%)}
.mode-card.active::before{opacity:1}
.mode-card-title{font-weight:600;font-size:15px;margin-bottom:6px;color:var(--text);font-family:'Space Grotesk',sans-serif;letter-spacing:-0.02em}
.mode-card-desc{font-size:12.5px;color:var(--text2);line-height:1.55}
.appliance-row{display:grid;grid-template-columns:28px 1fr auto auto auto auto;align-items:center;gap:8px;padding:10px 12px;background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:10px;transition:all .15s}
.appliance-row:hover{border-color:var(--border2);background:rgba(255,255,255,0.04)}
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--radius-lg);padding:48px;text-align:center;cursor:pointer;transition:all .18s;position:relative;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent)}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-soft)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.kit-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:all .2s;position:relative}
.kit-card.recommended{border-color:var(--accent-ring);background:linear-gradient(180deg,rgba(77,123,255,0.06),var(--card) 35%)}
.kit-card.recommended::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent) 30%,var(--accent) 70%,transparent)}
.kit-card.robust{border-color:rgba(184,243,45,0.25);background:linear-gradient(180deg,rgba(184,243,45,0.05),var(--card) 35%)}
.kit-card.robust::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--lime) 30%,var(--lime) 70%,transparent)}
.kit-header{padding:22px 24px;border-bottom:1px solid var(--border)}
.kit-name{font-size:22px;font-weight:700;margin:8px 0 4px;font-family:'Space Grotesk',sans-serif;letter-spacing:-0.025em;color:var(--text)}
.kit-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:18px 24px}
.kit-stat{background:rgba(255,255,255,0.025);border-radius:10px;padding:14px;border:1px solid var(--border)}
.kit-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:600}
.kit-stat-value{font-size:18px;font-weight:600;font-family:'Space Grotesk',sans-serif;color:var(--text);letter-spacing:-0.025em;font-variant-numeric:tabular-nums}
.coverage-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-top:6px}
.coverage-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--accent),var(--lime))}
.roi-stat{text-align:center;background:rgba(255,255,255,0.025);border-radius:12px;padding:16px;border:1px solid var(--border)}
.roi-value{font-size:24px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:var(--text);letter-spacing:-0.03em;font-variant-numeric:tabular-nums}
.roi-label{font-size:11px;color:var(--text2);margin-top:4px;letter-spacing:0.01em}
.bill-block{background:rgba(255,255,255,0.025);border-radius:12px;padding:16px;border:1px solid var(--border)}
.bill-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:600}
.bill-value{font-size:22px;font-weight:600;font-family:'Space Grotesk',sans-serif;color:var(--text);letter-spacing:-0.025em;font-variant-numeric:tabular-nums}
.bill-sub{font-size:11px;color:var(--text2);margin-top:2px}
.loading-pulse{animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.glow-text{background:linear-gradient(120deg,#FFFFFF 0%,var(--accent) 50%,var(--lime) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:700}
.tab-bar{display:inline-flex;gap:2px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:24px}
.tab{padding:8px 18px;border-radius:7px;font-size:12px;font-weight:500;color:var(--text2);border:none;background:transparent;transition:all .15s;cursor:pointer;letter-spacing:-0.005em}
.tab:hover{color:var(--text)}
.tab.active{background:rgba(255,255,255,0.06);color:var(--text)}
.ai-box{background:linear-gradient(135deg,var(--accent-soft),rgba(184,243,45,0.05));border:1px solid var(--accent-ring);border-radius:12px;padding:18px;margin-bottom:24px;position:relative;overflow:hidden}
.ai-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--lime),transparent)}
.fade-in{animation:fadeIn .35s cubic-bezier(.4,0,.2,1) forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.appliance-list{display:flex;flex-direction:column;gap:8px;max-height:380px;overflow-y:auto;padding-right:4px}
.battery-panel{background:linear-gradient(135deg,rgba(251,191,36,0.06),transparent);border:1px solid rgba(251,191,36,0.22);border-radius:12px;padding:16px;margin:0 24px 18px;position:relative}
.bom-row{display:grid;grid-template-columns:36px 1fr 110px;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--border);font-size:12px;transition:background .15s}
.bom-row:hover{background:rgba(255,255,255,0.02)}
.bom-row:last-child{border-bottom:none}
.divider-label{display:flex;align-items:center;gap:10px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-weight:600;margin:0 0 10px}
.divider-label::before,.divider-label::after{content:'';flex:1;height:1px;background:var(--border)}
.kbd{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.06);border:1px solid var(--border2);color:var(--text2)}
@keyframes scanLine{0%{transform:translateY(0)}50%{transform:translateY(150px)}100%{transform:translateY(0)}}
@keyframes scanGlow{0%{transform:translateY(0);opacity:.7}50%{transform:translateY(140px);opacity:.3}100%{transform:translateY(0);opacity:.7}}

</style>

<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useMemo, useRef, useEffect } = React;

// ─── THEME ─────────────────────────────────────────────────────────────────────
function useTheme(){
  const [theme,setTheme]=useState(()=>{
    try{
      const saved=localStorage.getItem('rv-theme');
      if(saved==='light'||saved==='dark') return saved;
    }catch(_e){}
    return 'dark';
  });
  useEffect(()=>{
    document.documentElement.dataset.theme=theme;
    try{localStorage.setItem('rv-theme',theme);}catch(_e){}
  },[theme]);
  return [theme,setTheme];
}

function ThemeToggle({theme,setTheme}){
  const isLight=theme==='light';
  return (
    <button onClick={()=>{SFX.click();setTheme(isLight?'dark':'light');}}
      onMouseEnter={SFX.hover}
      aria-label={isLight?'Cambiar a modo oscuro':'Cambiar a modo claro'}
      title={isLight?'Modo oscuro':'Modo claro'}
      style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:36,height:36,borderRadius:10,border:'1px solid var(--border2)',background:'var(--surface-1)',color:'var(--text2)',cursor:'pointer',transition:'all .15s'}}>
      {isLight?(
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      ):(
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      )}
    </button>
  );
}

// ─── SOUND ENGINE (Web Audio API — no necesita archivos ni APIs) ────────────
const SFX=(()=>{
  let ctx;
  const getCtx=()=>{if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;};
  const play=(freq,type,dur,vol=0.08)=>{
    try{
      const c=getCtx(),o=c.createOscillator(),g=c.createGain();
      o.type=type;o.frequency.value=freq;
      g.gain.setValueAtTime(vol,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
      o.connect(g);g.connect(c.destination);
      o.start(c.currentTime);o.stop(c.currentTime+dur);
    }catch(e){}
  };
  return{
    hover:()=>play(1800,'sine',0.06,0.03),
    click:()=>{play(800,'sine',0.08,0.06);setTimeout(()=>play(1200,'sine',0.06,0.04),50);},
    success:()=>{play(523,'sine',0.12,0.07);setTimeout(()=>play(659,'sine',0.12,0.07),100);setTimeout(()=>play(784,'sine',0.18,0.07),200);},
    step:()=>{play(600,'triangle',0.1,0.05);setTimeout(()=>play(900,'triangle',0.08,0.04),60);},
    scan:()=>{play(440,'sawtooth',0.3,0.02);play(880,'sine',0.4,0.015);},
    error:()=>{play(300,'square',0.15,0.04);setTimeout(()=>play(220,'square',0.2,0.04),120);},
    add:()=>{play(1047,'sine',0.08,0.05);setTimeout(()=>play(1319,'sine',0.06,0.04),40);},
    remove:()=>play(400,'triangle',0.12,0.04),
  };

const EFF={chapa:.9,teja:.98,suelo:1};
const SE=.85;

function gen(Wp,hsp,roof){return Math.round((Wp/1000)*hsp*30*SE*(EFF[roof]||1));}
// Autonomía: consumo continuo a plena carga (peor caso), DOD 90%
function autoHours(batKwh,kwhMes){
  if(!batKwh||!kwhMes) return null;
  return (batKwh*.9)/((kwhMes/30)/24);
}
function fmtAuto(h){
  if(!h) return null;
  return h>=24?`${(h/24).toFixed(1)} días`:`${h.toFixed(1)} horas`;
}
function fmt(n,d=0){return Number(n).toLocaleString('es-AR',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtUSD(n){return `USD ${fmt(n)}`;}

function pickKits(kwhMes,mode,ph,roof,hsp){
  const daily=kwhMes/30;
  const mult=mode==='offgrid'?1.35:1;
  const need=(daily*mult)/(hsp*SE*(EFF[roof]||1));
  const pool=KITS.filter(k=>{
    if(mode==='ongrid') return k.type==='ongrid'&&k.ph===ph;
    if(mode==='hybrid') return k.type==='hybrid'&&k.ph===ph;
    if(mode==='offgrid') return k.type==='offgrid';
    return false;
  }).sort((a,b)=>a.Wp-b.Wp);
  let i=pool.findIndex(k=>(k.Wp/1000)>=need);
  if(i===-1) i=pool.length-1;
  return {opt:pool[i]||null,rob:pool[i+1]||null};
}

const BILL_PROMPT=`Sos un experto en facturas eléctricas argentinas. Tu tarea es extraer datos de esta factura de luz.

PASO 1 — IDENTIFICAR DATOS BÁSICOS:
- Empresa distribuidora (Edenor, Edesur, EPEC, EPE, EDELAP, EDEA, EDEN, EDES, cooperativas, etc.)
- Tarifa/tipo de usuario (T1-R, T1-R2, T1-G, T2, T3, Residencial, etc.)
- Período facturado (fechas desde/hasta)

PASO 2 — EXTRAER CONSUMO ACTUAL:
Buscá la sección "Consumo eléctrico" o "Total Consumo". Ejemplo: "Total Consumo 379 kWh en 29 días".
Si no aparece directamente, buscá lecturas del medidor: Lectura actual - Lectura anterior = consumo en kWh.
También buscá "kWh facturados", "Energía activa", "Consumo registrado".

PASO 3 — EXTRAER HISTORIAL DE CONSUMO:
Muchas facturas argentinas incluyen un gráfico de barras o tabla con "Evolución anual de su consumo" o "Consumo histórico" mostrando kWh/día de los últimos meses con etiquetas como 25/05, 25/06, etc.
Los valores del gráfico suelen estar en kWh/día (promedio diario de cada período).
Extraé TODOS los valores históricos que puedas leer, incluyendo el período actual.
Si los valores están en kWh/día, multiplicá por 30 para estimar el mensual.

PASO 4 — IMPORTE:
Buscá "Total a pagar", "TOTAL A PAGAR" o similar. Es el monto en pesos argentinos.

PASO 5 — DESGLOSE HORARIO:
Solo si la factura muestra EXPLÍCITAMENTE consumo separado en "pico", "valle" y "resto" (o "fuera de pico").
Las tarifas T1 residenciales normalmente NO tienen desglose horario.

Devolvé ÚNICAMENTE un JSON puro. Sin markdown, sin backticks, sin texto antes ni después:
{
  "empresa": "nombre de la distribuidora",
  "tipoUsuario": "tarifa tal como aparece (ej: T1-R2 Residencial)",
  "periodo": "mes/año (ej: Febrero-Marzo 2026)",
  "tieneDesglosoHorario": false,
  "totalKwh": 379,
  "picoKwh": null,
  "valleKwh": null,
  "restoKwh": null,
  "potenciaContratadaKw": null,
  "importeTotal": 41881.77,
  "diasPeriodo": 29,
  "promedioDiarioKwh": 13.07,
  "historial": [
    {"periodo": "May 2025", "kwhDia": 6, "kwhMes": 180},
    {"periodo": "Jun 2025", "kwhDia": 6, "kwhMes": 180},
    {"periodo": "Jul 2025", "kwhDia": 7, "kwhMes": 210}
  ],
  "consumoMaxKwhMes": 690,
  "consumoPromedioKwhMes": 350,
  "observaciones": "notas breves"
}

REGLAS CLAVE:
- totalKwh: número ENTERO de kWh del período actual. DEBE ser mayor a 0.
- historial: array con cada período visible en el gráfico/tabla de evolución. kwhDia es el valor del gráfico, kwhMes es kwhDia × 30.
- consumoMaxKwhMes: el mayor kwhMes del historial (para dimensionar por pico).
- consumoPromedioKwhMes: promedio de todos los kwhMes del historial.
- Si tieneDesglosoHorario es false, picoKwh/valleKwh/restoKwh DEBEN ser null.
- promedioDiarioKwh = totalKwh / diasPeriodo.
- Si no podés leer algún dato, poné null o 0 y explicá en observaciones.

SOLO devolvé el JSON.`;

// ─── APP ────────────────────────────────────────────────────────────────────────
function App(){
  const [theme,setTheme]=useTheme();
  const [step,setStep]=useState(0);
  const [mode,setMode]=useState(null); // appliances | bill | manual
  const [apps,setApps]=useState([]);
  const [editId,setEditId]=useState(null);
  const [billFile,setBillFile]=useState(null);
  const [billImg,setBillImg]=useState(null);
  const [billData,setBillData]=useState(null);
  const [billLoad,setBillLoad]=useState(false);
  const [billErr,setBillErr]=useState(null);
  const [billStrategy,setBillStrategy]=useState('max'); // 'max' | 'avg' | 'current'
  const [manual,setManual]=useState(400);
  const [sysMode,setSysMode]=useState('ongrid');
  const [phase,setPhase]=useState('mono');
  const [roof,setRoof]=useState('chapa');
  const [zone,setZone]=useState('baires');
  const [factura,setFactura]=useState('');
  const [usd,setUsd]=useState(1150);

  const zoneObj=PROV.find(z=>z.id===zone)||PROV[0];

  const kwhMes=useMemo(()=>{
    if(mode==='manual') return manual;
    if(mode==='bill'&&billData){
      if(billStrategy==='max'&&billData.consumoMaxKwhMes>0) return billData.consumoMaxKwhMes;
      if(billStrategy==='avg'&&billData.consumoPromedioKwhMes>0) return billData.consumoPromedioKwhMes;
      return billData.totalKwh||0;
    }
    if(mode==='bill'&&billErr&&manual>0) return manual;
    if(mode==='appliances') return apps.reduce((s,a)=>s+(a.W*a.H*30*a.qty)/1000,0);
    return 0;
  },[mode,manual,billData,billErr,billStrategy,apps]);

  const {opt,rob}=useMemo(()=>{
    if(kwhMes<=0) return {opt:null,rob:null};
    return pickKits(kwhMes,sysMode,phase,roof,zoneObj.hsp);
  },[kwhMes,sysMode,phase,roof,zoneObj]);

  const addApp=db=>{
    const ex=apps.find(a=>a.dbId===db.id);
    if(ex) setApps(prev=>prev.map(a=>a.dbId===db.id?{...a,qty:a.qty+1}:a));
    else setApps(prev=>[...prev,{id:Date.now(),dbId:db.id,emoji:db.emoji,name:db.name,W:db.W,H:db.H,qty:1}]);
  };
  const updApp=(id,f,v)=>setApps(prev=>prev.map(a=>a.id===id?{...a,[f]:parseFloat(v)||0}:a));
  const delApp=id=>setApps(prev=>prev.filter(a=>a.id!==id));

  const toB64=f=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(f);});

  const analyzeBill=async f=>{
    setBillLoad(true);setBillErr(null);setBillData(null);
    try{
      const b64=await toB64(f);
      const mime=f.type||(f.name.toLowerCase().endsWith('.pdf')?'application/pdf':'image/jpeg');
      const isPdf=mime==='application/pdf';

      const buildContent=(prompt)=>{
        if(isPdf) return [{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:prompt}];
        return [{type:'image',source:{type:'base64',media_type:mime,data:b64}},{type:'text',text:prompt}];
      };

      const callAPI=async (prompt)=>{
        const r=await fetch('/api/analyze',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:buildContent(prompt)}]})
        });
        if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`Error ${r.status}`);}
        return r.json();
      };

      const parseResponse=(data)=>{
        const raw=(data.content||[]).map(c=>c.text||'').join('').trim();
        let clean=raw.replace(/```(?:json)?\s*/gi,'').replace(/\s*```/g,'').trim();
        const i=clean.indexOf('{');
        const j=clean.lastIndexOf('}');
        if(i===-1||j===-1) throw new Error('No se encontró JSON en la respuesta');
        clean=clean.substring(i,j+1);
        clean=clean.replace(/,\s*([}\]])/g,'$1');
        return JSON.parse(clean);
      };

      // Intento 1: prompt completo
      let parsed;
      try{
        const data=await callAPI(BILL_PROMPT);
        parsed=parseResponse(data);
      }catch(e1){
        // Intento 2: prompt simplificado
        const fallback=`Extraé de esta factura eléctrica argentina estos datos. Devolvé SOLO un JSON puro sin markdown:
{"empresa":"","tipoUsuario":"","periodo":"","tieneDesglosoHorario":false,"totalKwh":0,"importeTotal":0,"diasPeriodo":30,"promedioDiarioKwh":0,"historial":[],"consumoMaxKwhMes":0,"consumoPromedioKwhMes":0,"observaciones":""}
Buscá "Total Consumo X kWh" o lecturas del medidor. El importe es "Total a pagar".`;
        try{
          const data2=await callAPI(fallback);
          parsed=parseResponse(data2);
        }catch(e2){
          throw new Error(`No se pudo procesar después de 2 intentos. ${e1.message}`);
        }
      }

      // Validación
      if(!parsed.totalKwh||parsed.totalKwh<=0){
        SFX.error();setBillErr(`La IA no pudo extraer los kWh. ${parsed.observaciones||''} Ingresá el consumo manualmente abajo.`);
        return;
      }

      // Sanitizar campos
      if(!parsed.diasPeriodo||parsed.diasPeriodo<=0) parsed.diasPeriodo=30;
      parsed.promedioDiarioKwh=parsed.totalKwh/parsed.diasPeriodo;
      if(!parsed.tieneDesglosoHorario){parsed.picoKwh=null;parsed.valleKwh=null;parsed.restoKwh=null;}

      // Sanitizar historial
      if(!Array.isArray(parsed.historial)) parsed.historial=[];
      parsed.historial=parsed.historial.filter(h=>h&&(h.kwhMes>0||h.kwhDia>0)).map(h=>({
        ...h,
        kwhMes:h.kwhMes||(h.kwhDia?Math.round(h.kwhDia*30):0),
        kwhDia:h.kwhDia||(h.kwhMes?Math.round(h.kwhMes/30):0)
      }));

      // Calcular max y promedio
      if(parsed.historial.length>0){
        const ms=parsed.historial.map(h=>h.kwhMes);
        if(!parsed.consumoMaxKwhMes||parsed.consumoMaxKwhMes<=0) parsed.consumoMaxKwhMes=Math.max(...ms);
        if(!parsed.consumoPromedioKwhMes||parsed.consumoPromedioKwhMes<=0) parsed.consumoPromedioKwhMes=Math.round(ms.reduce((a,b)=>a+b,0)/ms.length);
      } else {
        if(!parsed.consumoMaxKwhMes) parsed.consumoMaxKwhMes=parsed.totalKwh;
        if(!parsed.consumoPromedioKwhMes) parsed.consumoPromedioKwhMes=parsed.totalKwh;
      }

      setBillData(parsed);SFX.success();
      if(parsed.importeTotal) setFactura(String(parsed.importeTotal));
    }catch(e){
      SFX.error();setBillErr(`Error al leer la factura: ${e.message}. Podés ingresar el consumo en kWh manualmente abajo.`);
    }finally{setBillLoad(false);}
  };

  const onFile=e=>{
    const f=e.target.files[0];if(!f)return;
    setBillFile(f);
    setBillImg(f.type.startsWith('image/')?URL.createObjectURL(f):null);
    SFX.scan();analyzeBill(f);

  const canGo=mode&&(
    (mode==='appliances'&&apps.length>0)||
    (mode==='bill'&&(billData||billErr))||
    (mode==='manual'&&manual>0)
  );

  if(step===2) return <Results
    opt={opt} rob={rob} kwhMes={kwhMes} sysMode={sysMode}
    phase={phase} roof={roof} zone={zoneObj}
    billData={billData} factura={factura} setFactura={setFactura}

    theme={theme} setTheme={setTheme}/>;

  return(
    <div style={{minHeight:'100vh'}}>

      <div className="nav">

        <div className="nav-steps">

        </div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <ThemeToggle theme={theme} setTheme={setTheme}/>
          <LogoTCL h={24}/>
        </div>
      </div>

      <div className="main">
        {/* ─── STEP 0 ─── */}
        {step===0&&(
          <div className="fade-in">
            <div style={{textAlign:'center',marginBottom:32}}>
              <div style={{display:'inline-flex',alignItems:'center',gap:10,background:'rgba(255,255,255,0.03)',border:'1px solid var(--border2)',borderRadius:999,padding:'6px 14px 6px 8px',marginBottom:20,fontSize:11.5,color:'var(--text2)',fontWeight:500,letterSpacing:'0.01em'}}>
                <span style={{display:'inline-flex',alignItems:'center',gap:6,padding:'3px 8px',borderRadius:999,background:'var(--lime-soft)',color:'var(--lime)',fontWeight:600,fontSize:10,textTransform:'uppercase',letterSpacing:'0.06em'}}>
                  <span style={{width:5,height:5,borderRadius:'50%',background:'var(--lime)',boxShadow:'0 0 8px var(--lime)'}} className="loading-pulse"/>
                  Beta
                </span>
                <span>Motor de dimensionamiento · TCL Solar × GoodWe</span>
              </div>
              <h1 style={{fontSize:46,fontWeight:600,lineHeight:1.05,marginBottom:14,letterSpacing:'-0.035em'}}>
                Diseñá tu sistema solar<br/><span className="glow-text">en menos de un minuto.</span>
              </h1>
              <p style={{color:'var(--text2)',fontSize:15,maxWidth:540,margin:'0 auto',lineHeight:1.6}}>Calculá el kit ideal con datos reales de irradiación, factura energética o por electrodomésticos. Ingeniería precisa, asistida por IA.</p>
            </div>

            <div className="mode-grid" style={{maxWidth:860,margin:'0 auto 28px'}}>
              {[
                {v:'appliances',icon:'🏠',title:'Por electrodomésticos',desc:'Indicá qué aparatos tenés y cuántas horas los usás. La IA estima los kWh automáticamente. Podés editar cada valor.'},
                {v:'bill',icon:'📄',title:'Subir factura de luz',desc:'Cargá tu factura en PDF o foto. La IA detecta el tipo de tarifa: si es residencial simple extrae el total; si tiene desglose horario también muestra pico/valle/resto.'},
                {v:'manual',icon:'⚡',title:'Ingreso manual (kWh)',desc:'Si ya sabés tu consumo mensual en kWh, ingresalo directamente.'},
              ].map(o=>(
                <div key={o.v} className={`mode-card ${mode===o.v?"active":""}`} onMouseEnter={SFX.hover} onClick={()=>{SFX.click();setMode(o.v);}}>
                  <div style={{fontSize:24,marginBottom:8}}>{o.icon}</div>
                  <div className="mode-card-title">{o.title}</div>
                  <div className="mode-card-desc">{o.desc}</div>
                  {mode===o.v&&<div style={{marginTop:10}}><span className="badge badge-accent"><IC.check/> Seleccionado</span></div>}
                </div>
              ))}
            </div>

            {/* APPLIANCES */}
            {mode==='appliances'&&(
              <div style={{maxWidth:1060,margin:'0 auto'}} className="fade-in">
                <div className="grid-2" style={{gap:20}}>
                  {/* Catalog */}
                  <div className="card">
                    <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>Catálogo de equipos</div>
                    <div style={{fontSize:12,color:'var(--text2)',marginBottom:14}}>Hacé clic para agregar · podés editar watts y horas</div>
                    {['entretenimiento','electrodomesticos','clima','iluminacion','otro'].map(cat=>(
                      <div key={cat} style={{marginBottom:14}}>
                        <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--text3)',fontWeight:600,marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
                          <div style={{height:1,flex:1,background:'var(--border)'}}/>
                          {cat}
                          <div style={{height:1,flex:1,background:'var(--border)'}}/>
                        </div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                          {APPS.filter(a=>a.cat===cat).map(a=>(
                            <button key={a.id} onClick={()=>{SFX.add();addApp(a);}} className="btn btn-secondary btn-sm" style={{gap:4,fontSize:12}} title={a.note||''}>
                              {a.emoji} {a.name}

                          ))}
                        </div>
                      </div>

                  </div>
                  {/* List */}
                  <div className="card" style={{display:'flex',flexDirection:'column'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>

                              <button className="btn btn-danger btn-sm" style={{padding:'5px 8px'}} onClick={()=>{SFX.remove();delApp(a.id);}}><IC.trash/></button>
                            </div>
                          );
                        })}
                      </div>

                        {billImg

                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:500}}>{billFile.name}</div>
                          <div style={{fontSize:11,color:'var(--text2)'}}>{(billFile.size/1024).toFixed(0)} KB</div>
                        </div>
                        <button className="btn btn-ghost btn-sm" onClick={()=>{setBillFile(null);setBillData(null);setBillErr(null);setBillImg(null);}}>
                          <IC.x/> Cambiar
                        </button>
                      </div>
                      {billLoad&&(
                        <div style={{textAlign:'center',padding:'28px 0'}}>
                          <div style={{position:'relative',width:120,height:160,margin:'0 auto 16px',background:'var(--card2)',borderRadius:8,border:'1px solid var(--border2)',overflow:'hidden',boxShadow:'0 4px 24px rgba(0,0,0,0.3)'}}>
                            {[0,1,2,3,4,5,6,7].map(i=>(<div key={i} style={{position:'absolute',left:16,right:16,top:24+i*16,height:2,background:'var(--border2)',borderRadius:1,opacity:0.5}}/>))}
                            <div style={{position:'absolute',left:0,right:0,height:2,background:'linear-gradient(90deg,transparent,#B8F32D,#4D7BFF,#B8F32D,transparent)',boxShadow:'0 0 12px #4D7BFF,0 0 24px rgba(77,123,255,0.4)',animation:'scanLine 1.8s ease-in-out infinite'}}/>
                            <div style={{position:'absolute',left:0,right:0,height:20,background:'linear-gradient(180deg,rgba(77,123,255,0.08),transparent)',animation:'scanGlow 1.8s ease-in-out infinite'}}/>
                            <div style={{position:'absolute',top:6,left:6,width:12,height:12,borderTop:'2px solid var(--accent)',borderLeft:'2px solid var(--accent)',opacity:0.6}}/>
                            <div style={{position:'absolute',top:6,right:6,width:12,height:12,borderTop:'2px solid var(--accent)',borderRight:'2px solid var(--accent)',opacity:0.6}}/>
                            <div style={{position:'absolute',bottom:6,left:6,width:12,height:12,borderBottom:'2px solid var(--accent)',borderLeft:'2px solid var(--accent)',opacity:0.6}}/>
                            <div style={{position:'absolute',bottom:6,right:6,width:12,height:12,borderBottom:'2px solid var(--accent)',borderRight:'2px solid var(--accent)',opacity:0.6}}/>
                          </div>
                          <style>{`@keyframes scanLine{0%{top:20px}50%{top:140px}100%{top:20px}}@keyframes scanGlow{0%{top:20px}50%{top:140px}100%{top:20px}}`}</style>
                          <div style={{fontSize:13,fontWeight:600,color:'var(--accent)'}}>La IA está analizando tu factura...</div>
                          <div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>Identificando distribuidora, tipo de tarifa y consumo</div>
                        </div>
                      )}
                      {billErr&&(
                        <div style={{background:'rgba(248,113,113,0.06)',border:'1px solid rgba(248,113,113,0.2)',borderRadius:10,padding:14,marginBottom:16}}>

                            <input type="number" value={manual} onChange={e=>setManual(Number(e.target.value))} style={{width:130}} placeholder="kWh/mes"/>
                            <span style={{fontSize:12,color:'var(--text2)'}}>kWh/mes</span>
                          </div>
                        </div>
                      )}
                      {billData&&(
                        <div style={{background:'var(--card2)',border:'1px solid var(--border2)',borderRadius:12,padding:14,marginTop:4}} className="fade-in">
                          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,flexWrap:'wrap'}}>
                            <span className="badge badge-accent"><IC.spark/> Lectura completada</span>
                            {billData.empresa&&<span style={{fontSize:12,color:'var(--text)',fontWeight:600}}>{billData.empresa}</span>}
                            {billData.tipoUsuario&&<span className="badge badge-orange">{billData.tipoUsuario}</span>}
                            {billData.periodo&&<span className="badge badge-blue">{billData.periodo}</span>}
                            {billData.tieneDesglosoHorario
                              ?<span className="badge badge-purple">⏱ Con desglose horario</span>
                              :<span className="badge badge-gray">Sin desglose horario</span>}
                          </div>
                          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:10}}>

                            {billData.tieneDesglosoHorario&&billData.picoKwh&&(
                              <div className="bill-block"><div className="bill-label">🌞 Pico</div><div className="bill-value" style={{color:'var(--red)'}}>{billData.picoKwh}</div><div className="bill-sub">kWh · {fmt(billData.picoKwh/billData.totalKwh*100,0)}%</div></div>

                            {billData.tieneDesglosoHorario&&billData.valleKwh&&(
                              <div className="bill-block"><div className="bill-label">🌙 Valle</div><div className="bill-value" style={{color:'var(--accent2)'}}>{billData.valleKwh}</div><div className="bill-sub">kWh · {fmt(billData.valleKwh/billData.totalKwh*100,0)}%</div></div>

                            {billData.tieneDesglosoHorario&&billData.restoKwh&&(

                                  return(
                                    <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                                      <div style={{fontSize:9,fontWeight:600,color:isMax?'var(--red)':'var(--accent)'}}>{h.kwhMes}</div>

                                <span>Promedio: <strong style={{color:'var(--accent)'}}>{billData.consumoPromedioKwhMes} kWh/mes</strong></span>
                                <span>Actual: <strong style={{color:'var(--text)'}}>{billData.totalKwh} kWh/mes</strong></span>

                                  <button key={o.v} onClick={()=>setBillStrategy(o.v)} style={{flex:1,minWidth:140,padding:'10px 12px',borderRadius:8,border:`1px solid ${billStrategy===o.v?'var(--accent)':'var(--border)'}`,background:billStrategy===o.v?'rgba(77,123,255,0.1)':'var(--card2)',textAlign:'left',cursor:'pointer',transition:'all .2s'}}>
                                    <div style={{fontSize:12,fontWeight:600,color:billStrategy===o.v?'var(--accent)':'var(--text)',marginBottom:2}}>{o.l}</div>
                                    <div style={{fontSize:10,color:'var(--text3)',lineHeight:1.4}}>{o.d}</div>
                                  </button>
                                ))}
                              </div>
                            </div>
                          )}

                          {billData.observaciones&&<div style={{fontSize:12,color:'var(--text2)',background:'var(--card)',borderRadius:8,padding:'8px 12px',border:'1px solid var(--border)',lineHeight:1.6,marginTop:10}}><span style={{fontWeight:600,color:'var(--text3)'}}>📝 </span>{billData.observaciones}</div>}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* MANUAL */}
            {mode==='manual'&&(
              <div style={{maxWidth:480,margin:'0 auto'}} className="fade-in">
                <div className="card">
                  <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>Consumo mensual en kWh</div>
                  <div style={{fontSize:12,color:'var(--text2)',marginBottom:18}}>Lo encontrás en tu factura eléctrica</div>
                  <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:20}}>
                    <input type="number" value={manual} onChange={e=>setManual(Number(e.target.value))} style={{fontSize:26,fontWeight:700,width:160,textAlign:'center',padding:'12px'}} min="50" max="5000"/>
                    <span style={{fontSize:16,color:'var(--text2)'}}>kWh / mes</span>
                  </div>
                  <input type="range" min="50" max="3000" step="25" value={manual} onChange={e=>setManual(Number(e.target.value))} style={{marginBottom:10}}/>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)',marginBottom:20}}><span>50</span><span>1000</span><span>2000</span><span>3000 kWh</span></div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
                    {[{l:'Pequeño hogar',v:150},{l:'Hogar familiar',v:350},{l:'Hogar con A/A',v:600},{l:'Comercio',v:1200}].map(p=>(
                      <button key={p.v} className="btn btn-ghost btn-sm" style={{flexDirection:'column',height:'auto',padding:'10px',textAlign:'center',borderColor:manual===p.v?'var(--accent)':'var(--border)'}} onClick={()=>setManual(p.v)}>
                        <span style={{fontWeight:700,fontSize:14,color:'var(--accent)'}}>{p.v}</span>
                        <span style={{fontSize:10,color:'var(--text2)',marginTop:2}}>{p.l}</span>
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {mode&&(
              <div style={{textAlign:'center',marginTop:28}}>
                <button className="btn btn-primary" style={{padding:'13px 36px',fontSize:15,opacity:canGo?1:0.5,cursor:canGo?'pointer':'not-allowed'}}
                  onClick={()=>{if(canGo){SFX.step();setStep(1);}}}>
                  Configurar el sistema <IC.arr/>
                </button>
                {!canGo&&mode!=='manual'&&<div style={{fontSize:12,color:'var(--text3)',marginTop:8}}>
                  {mode==='appliances'?'Agregá al menos un equipo':'Subí tu factura o ingresá el kWh manualmente'}
                </div>}
              </div>
            )}
          </div>
        )}

        {/* ─── STEP 1 ─── */}
        {step===1&&(
          <div className="fade-in" style={{maxWidth:860,margin:'0 auto'}}>
            <div style={{textAlign:'center',marginBottom:28}}>
              <div style={{fontSize:22,fontWeight:800,marginBottom:8}}>Configurá tu <span className="glow-text">sistema solar</span></div>
              <p style={{color:'var(--text2)',fontSize:13}}>Consumo estimado: <strong style={{color:'var(--accent)'}}>{fmt(kwhMes,0)} kWh/mes</strong></p>
            </div>
            <div className="grid-2" style={{gap:20,marginBottom:24}}>
              <div className="card">
                <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:12}}>Tipo de sistema</div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {[
                    {v:'ongrid',e:'⚡',t:'Solo ahorro (On-Grid)',d:'Genera energía y reduce tu factura. Excedentes se inyectan a la red.'},
                    {v:'hybrid',e:'🔋',t:'Ahorro + Respaldo (Híbrido)',d:'Genera energía + batería de respaldo para cortes de luz.'},
                    {v:'offgrid',e:'🌿',t:'Autonomía total (Off-Grid / Rural)',d:'Sin conexión a la red. Ideal para zonas rurales aisladas.'},
                  ].map(o=>(
                    <div key={o.v} className={`mode-card ${sysMode===o.v?"active":""}`} onMouseEnter={SFX.hover} style={{padding:'12px 14px'}} onClick={()=>{SFX.click();setSysMode(o.v);}}>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <div style={{fontSize:20}}>{o.e}</div>
                        <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{o.t}</div><div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{o.d}</div></div>
                        {sysMode===o.v&&<div style={{color:'var(--accent)'}}><IC.check/></div>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:14}}>
                <div className="card">
                  <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10}}>Conexión eléctrica</div>
                  <div style={{display:'flex',gap:8}}>
                    {[{v:'mono',l:'Monofásico (1Ø)',s:'Hogares y comercios pequeños'},{v:'tri',l:'Trifásico (3Ø)',s:'Industrias y grandes comercios'}].map(p=>(
                      <button key={p.v} onClick={()=>{SFX.click();setPhase(p.v);}} style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${phase===p.v?'var(--accent)':'var(--border)'}`,background:phase===p.v?'rgba(77,123,255,0.06)':'var(--card2)',textAlign:'left',cursor:'pointer',transition:'all .2s'}}>
                        <div style={{fontSize:13,fontWeight:600,color:phase===p.v?'var(--accent)':'var(--text)',marginBottom:4}}>{p.l}</div>
                        <div style={{fontSize:11,color:'var(--text2)'}}>{p.s}</div>
                      </button>
                    ))}
                  </div>
                </div>
                <div className="card">
                  <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10}}>Tipo de instalación</div>
                  <div style={{display:'flex',gap:8}}>
                    {[{v:'chapa',e:'🏚️',l:'Chapa',s:'5° incl.'},{v:'teja',e:'🏘️',l:'Teja',s:'25° incl.'},{v:'suelo',e:'🏔️',l:'Suelo/Losa',s:'30° incl.'}].map(r=>(
                      <button key={r.v} onClick={()=>{SFX.click();setRoof(r.v);}} style={{flex:1,padding:'10px',borderRadius:10,border:`1px solid ${roof===r.v?'var(--accent)':'var(--border)'}`,background:roof===r.v?'rgba(77,123,255,0.06)':'var(--card2)',textAlign:'center',cursor:'pointer',transition:'all .2s'}}>
                        <div style={{fontSize:18,marginBottom:4}}>{r.e}</div>
                        <div style={{fontSize:11,fontWeight:600,color:roof===r.v?'var(--accent)':'var(--text)'}}>{r.l}</div>
                        <div style={{fontSize:10,color:'var(--text3)'}}>{r.s}</div>
                      </button>
                    ))}
                  </div>
                </div>
                <div className="card">
                  <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>📍 Provincia</div>
                  <select value={zone} onChange={e=>setZone(e.target.value)} style={{width:'100%'}}>
                    {PROV.map(z=><option key={z.id} value={z.id}>{z.name} — {z.hsp} HSP/día</option>)}
                  </select>
                  <div style={{marginTop:8,fontSize:11,color:'var(--text2)'}}>
                    Irradiancia: <strong style={{color:'var(--accent)'}}>{zoneObj.hsp} HSP</strong> · Rendimiento: <strong style={{color:'var(--accent)'}}>{fmt(zoneObj.hsp*30*SE*(EFF[roof]||1),0)} kWh/kWp·mes</strong>
                  </div>
                </div>
              </div>
            </div>
            <div style={{display:'flex',gap:12,justifyContent:'center'}}>
              <button className="btn btn-secondary" onClick={()=>setStep(0)}>← Volver</button>
              <button className="btn btn-primary" style={{padding:'13px 36px',fontSize:15}} onClick={()=>{SFX.success();setStep(2);}}>Ver recomendación IA <IC.arr/></button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── RESULTS ────────────────────────────────────────────────────────────────────
function Results({opt,rob,kwhMes,sysMode,phase,roof,zone,billData,factura,setFactura,usd,setUsd,onBack,theme,setTheme}){
  const [tab,setTab]=useState('kits');
  const [roiK,setRoiK]=useState('opt');
  const [tna,setTna]=useState(60);
  const [extraOpt,setExtraOpt]=useState(0);
  const [extraRob,setExtraRob]=useState(0);

  const gOpt=opt?gen(opt.Wp,zone.hsp,roof):0;
  const gRob=rob?gen(rob.Wp,zone.hsp,roof):0;
  const cOpt=kwhMes>0?Math.min(Math.round((gOpt/kwhMes)*100),100):0;
  const cRob=kwhMes>0?Math.min(Math.round((gRob/kwhMes)*100),100):0;

  const billN=parseFloat(factura)||0;
  const batPrice=phase==='mono'?BAT_MONO:BAT_TRI;
  const rKit=roiK==='opt'?opt:rob;
  const rExtra=roiK==='opt'?extraOpt:extraRob;
  const rCov=roiK==='opt'?cOpt:cRob;
  const rPrice=rKit?(rKit.price+rExtra*batPrice):0;
  const rARS=rPrice*usd;
  const ahMes=billN*(rCov/100);
  const ahAno=ahMes*12;
  const payback=ahAno>0?(rARS/ahAno):0;

  // KIT CARD
  function KitCard({kit,g,cov,type,label,color,bc,extra,setExtra}){
    if(!kit) return(
      <div className="kit-card" style={{padding:28,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'var(--text3)',minHeight:200,gap:10}}>
        <span style={{fontSize:28}}>—</span>
        <span style={{fontSize:13}}>No hay opción superior disponible</span>
      </div>
    );
    const hasBat=kit.bat>0;
    const totalBat=kit.bat+(extra*BAT_KWH);
    const aH=autoHours(totalBat,kwhMes);
    const aStr=fmtAuto(aH);
    const extraCost=extra*batPrice;
    const totalP=kit.price+extraCost;
    const st=kit.str[roof]||kit.str.chapa;
    return(
      <div className={`kit-card ${type}`}>
        <div className="kit-header">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div>
              <span className={`badge ${bc}`}>{label}</span>
              <div className="kit-name">{kit.name}</div>
              <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{kit.id} · {(kit.Wp/1000).toFixed(2)} kWp · {kit.panels} paneles TCL 585W TopCon</div>
            </div>
            <div style={{textAlign:'right',minWidth:100}}>
              <div style={{fontSize:22,fontWeight:800,color,fontFamily:'Space Grotesk'}}>{fmtUSD(totalP)}</div>
              {extra>0&&<div style={{fontSize:11,color:'var(--text3)',textDecoration:'line-through'}}>{fmtUSD(kit.price)}</div>}
              <div style={{fontSize:10,color:'var(--text3)'}}>+ IVA · sin instalación</div>
            </div>
          </div>
          <div style={{marginTop:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
              <span style={{fontSize:11,color:'var(--text2)'}}>Cobertura del consumo</span>
              <span style={{fontSize:16,fontWeight:800,color:cov>=100?color:'var(--text)'}}>{cov}%</span>
            </div>
            <div className="coverage-bar"><div className="coverage-fill" style={{width:`${cov}%`,background:`linear-gradient(90deg,${color},${color}99)`}}/></div>
            <div style={{fontSize:11,color:'var(--text2)',marginTop:4}}>Genera <strong style={{color}}>{fmt(g,0)} kWh/mes</strong> de {fmt(kwhMes,0)} kWh de consumo</div>
          </div>
        </div>
        <div className="kit-stats">
          <div className="kit-stat">
            <div className="kit-stat-label">🔆 Generación mensual</div>
            <div className="kit-stat-value" style={{color}}>{fmt(g,0)} <span style={{fontSize:12,color:'var(--text2)',fontWeight:400}}>kWh</span></div>
          </div>
          <div className="kit-stat">
            <div className="kit-stat-label">⚡ Potencia pico</div>
            <div className="kit-stat-value">{(kit.Wp/1000).toFixed(2)} <span style={{fontSize:12,color:'var(--text2)',fontWeight:400}}>kWp</span></div>
          </div>
          <div className="kit-stat">
            <div className="kit-stat-label">🔄 Inversor</div>
            <div className="kit-stat-value" style={{fontSize:12,lineHeight:1.3}}>{kit.inv}</div>
          </div>
          {hasBat?(
            <div className="kit-stat" style={{borderColor:extra>0?'rgba(251,191,36,0.3)':'var(--border)',background:extra>0?'rgba(251,191,36,0.05)':'var(--card2)'}}>
              <div className="kit-stat-label">🔋 Batería · Autonomía</div>
              <div className="kit-stat-value" style={{fontSize:14,color:extra>0?'#FBBF24':undefined}}>
                {totalBat} kWh
                {aStr&&<span style={{fontSize:11,color:'var(--text2)',fontWeight:400,display:'block',marginTop:2}}>~{aStr} a plena carga*</span>}
              </div>
              {extra>0&&<div style={{fontSize:10,color:'#FBBF24',marginTop:2}}>+{extra} módulo{extra>1?'s':''} adicional{extra>1?'es':''}</div>}
            </div>
          ):(
            <div className="kit-stat">
              <div className="kit-stat-label">🏗️ Estructura</div>
              <div className="kit-stat-value" style={{fontSize:12}}>{st}</div>
            </div>
          )}
        </div>

        {/* ADICIONALES */}
        {hasBat&&(
          <div className="battery-panel">
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <IC.bat/><div style={{fontSize:12,fontWeight:600,color:'#FBBF24'}}>Adicionales — Ampliar banco de baterías</div>
            </div>
            <div style={{fontSize:11,color:'var(--text2)',marginBottom:12,lineHeight:1.6}}>
              Cada módulo suma <strong style={{color:'var(--text)'}}>5 kWh</strong> y extiende la autonomía. <strong style={{color:'#FBBF24'}}>{fmtUSD(batPrice)} + IVA</strong> por módulo.<br/>
              <span style={{fontSize:10,color:'var(--text3)'}}>*Autonomía calculada con <strong>todos los equipos a plena carga simultánea</strong> (escenario más conservador). En la práctica la duración real es mayor.</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <button onClick={()=>{SFX.remove();setExtra(Math.max(0,extra-1));}}
                style={{width:32,height:32,borderRadius:8,border:'1px solid rgba(251,191,36,0.3)',background:'rgba(251,191,36,0.1)',color:'#FBBF24',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}
                disabled={extra===0}><IC.minus/></button>
              <div style={{textAlign:'center',minWidth:70}}>
                <div style={{fontSize:22,fontWeight:800,color:'#FBBF24',fontFamily:'Space Grotesk'}}>{extra}</div>
                <div style={{fontSize:10,color:'var(--text3)'}}>módulo{extra!==1?'s':''} extra</div>
              </div>
              <button onClick={()=>{SFX.add();setExtra(extra+1);}}
                style={{width:32,height:32,borderRadius:8,border:'1px solid rgba(251,191,36,0.3)',background:'rgba(251,191,36,0.1)',color:'#FBBF24',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}><IC.plus/></button>
              {extra>0&&(
                <div style={{marginLeft:6,flex:1}}>
                  <div style={{fontSize:12,color:'#FBBF24',fontWeight:600}}>+{fmtUSD(extraCost)} extra</div>
                  <div style={{fontSize:11,color:'var(--text2)'}}>Total: <strong style={{color:'var(--text)'}}>{fmtUSD(totalP)}</strong> · {totalBat} kWh · {aStr||'—'}</div>
                </div>
              )}
            </div>
          </div>
        )}

        <div style={{padding:'0 20px 18px'}}>
          <div style={{background:`${color}08`,borderRadius:10,padding:'9px 14px',border:`1px solid ${color}20`,fontSize:12,color:'var(--text2)',lineHeight:1.5}}>
            {sysMode==='ongrid'&&`Sistema conectado a la red. Excedentes se inyectan y generan créditos. Payback est.: ${billN>0?`${(kit.price*usd/(billN*(cov/100)*12)).toFixed(1)} años`:'4-7 años'} según autoconsumo.`}
            {sysMode==='hybrid'&&`Con ${totalBat} kWh de batería tenés ${aStr||'—'} de autonomía a plena carga ante cortes de red.`}
            {sysMode==='offgrid'&&`Sistema autónomo. Con ${totalBat} kWh garantizás ${aStr||'—'} de suministro a plena carga.`}
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:'100vh'}}>
      <div className="nav">
        <LogoRV h={38} theme={theme}/>
        <div className="nav-steps">
          {['Consumo','Configuración','Resultado'].map((s,i)=>(
            <div key={i} className={`step-pill ${i===2?'active':i<2?'done':''}`}>{i+1}. {s}</div>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <ThemeToggle theme={theme} setTheme={setTheme}/>
          <LogoTCL h={24}/>
          <button className="btn btn-ghost btn-sm" onClick={onBack}>← Modificar</button>
        </div>
      </div>
      <div className="main">
        {/* Summary */}
        <div className="ai-box" style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap',marginBottom:20}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:5}}><IC.spark/><span style={{fontSize:13,fontWeight:600,color:'var(--accent)'}}>Análisis IA completado</span></div>
            <div style={{fontSize:13,color:'var(--text2)'}}>
              Para <strong style={{color:'var(--text)'}}>{fmt(kwhMes,0)} kWh/mes</strong> en <strong style={{color:'var(--text)'}}>{zone.name}</strong> ({zone.hsp} HSP) ·
              Sistema <strong style={{color:'var(--text)'}}>{sysMode==='ongrid'?'On-Grid':sysMode==='hybrid'?'Híbrido':'Off-Grid'}</strong> · {phase==='mono'?'Monofásico':'Trifásico'} · {roof.charAt(0).toUpperCase()+roof.slice(1)}
            </div>
          </div>
          <div style={{display:'flex',gap:6,flexShrink:0,flexWrap:'wrap'}}>
            <span className="badge badge-accent"><IC.sun/> {zone.hsp} HSP/día</span>
            {sysMode!=='ongrid'&&<span className="badge badge-blue"><IC.bat/> Con batería</span>}
            <span className="badge badge-orange">{phase==='mono'?'1Ø':'3Ø'} · {roof}</span>
          </div>
        </div>

        {/* Tabs */}
        <div className="tab-bar">
          {[{id:'kits',l:'🏆 Kits Recomendados'},{id:'roi',l:'💰 Retorno de Inversión'},{id:'bill',l:'📊 Análisis Tarifario'},{id:'bom',l:'📋 Lista de Materiales'}].map(t=>(
            <button key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>{SFX.click();setTab(t.id);}}>{t.l}</button>
          ))}
        </div>

        {/* KITS */}
        {tab==='kits'&&(
          <div className="fade-in">
            <div className="grid-2" style={{gap:20}}>
              <KitCard kit={opt} g={gOpt} cov={cOpt} type="recommended" label="⭐ Recomendado" color="var(--accent)" bc="badge-accent" extra={extraOpt} setExtra={setExtraOpt}/>
              <KitCard kit={rob} g={gRob} cov={cRob} type="robust" label="💪 Opción Robusta" color="var(--accent2)" bc="badge-blue" extra={extraRob} setExtra={setExtraRob}/>
            </div>
            {billN<=0&&<div style={{textAlign:'center',marginTop:20}}><button className="btn btn-secondary" onClick={()=>setTab('roi')}>💰 Calcular retorno de inversión →</button></div>}
          </div>
        )}

        {/* ROI */}
        {tab==='roi'&&(
          <div className="fade-in" style={{maxWidth:880,margin:'0 auto'}}>
            <div className="grid-2" style={{gap:20}}>
              <div className="card">
                <div style={{fontSize:13,fontWeight:600,marginBottom:16}}>📊 Parámetros financieros</div>
                <div style={{marginBottom:14}}>
                  <label style={{fontSize:11,color:'var(--text3)',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.04em'}}>Kit a calcular</label>
                  <div style={{display:'flex',gap:8}}>
                    {[{v:'opt',k:opt},{v:'rob',k:rob}].filter(x=>x.k).map(({v,k})=>(
                      <button key={v} onClick={()=>setRoiK(v)} className={`btn ${roiK===v?'btn-primary':'btn-secondary'} btn-sm`}>{k.name}</button>
                    ))}
                  </div>
                </div>
                <div style={{marginBottom:14}}>
                  <label style={{fontSize:11,color:'var(--text3)',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.04em'}}>Factura mensual de luz ($ ARS)</label>
                  <input type="number" value={factura} onChange={e=>setFactura(e.target.value)} placeholder="Ej: 85000" style={{width:'100%'}}/>
                  {billData?.importeTotal&&<div style={{fontSize:11,color:'var(--accent)',marginTop:4}}>✓ De tu factura: ${fmt(billData.importeTotal,0)}</div>}
                </div>
                <div style={{marginBottom:14}}>
                  <label style={{fontSize:11,color:'var(--text3)',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.04em'}}>Tipo de cambio USD ($ ARS)</label>
                  <input type="number" value={usd} onChange={e=>setUsd(Number(e.target.value))} style={{width:'100%'}}/>
                </div>
                <div style={{marginBottom:14}}>
                  <label style={{fontSize:11,color:'var(--text3)',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.04em'}}>TNA / inflación tarifaria estimada (%)</label>
                  <input type="range" min="30" max="200" step="5" value={tna} onChange={e=>setTna(Number(e.target.value))}/>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text3)',marginTop:4}}>
                    <span>30%</span><span style={{color:'var(--accent)',fontWeight:600}}>{tna}%</span><span>200%</span>
                  </div>
                </div>
                {rKit&&(
                  <div style={{background:'var(--card2)',borderRadius:10,padding:12,border:'1px solid var(--border)'}}>
                    <div style={{fontSize:11,color:'var(--text2)',marginBottom:4}}>Kit seleccionado</div>
                    <div style={{fontSize:14,fontWeight:700}}>{rKit.name}{rExtra>0?` +${rExtra} batería${rExtra>1?'s':''} adicional${rExtra>1?'es':''}`:''}</div>
                    <div style={{fontSize:13,color:'var(--accent)',marginTop:4}}>{fmtUSD(rPrice)} = $ {fmt(rARS,0)} ARS</div>
                  </div>
                )}
              </div>
              <div className="card">
                <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>📈 Proyección financiera</div>
                {billN>0&&rKit?(
                  <>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:18}}>
                      <div className="roi-stat"><div className="roi-value" style={{color:'var(--accent)'}}>{ahMes>0?`$${fmt(ahMes,0)}`:'—'}</div><div className="roi-label">Ahorro mensual</div></div>
                      <div className="roi-stat"><div className="roi-value" style={{color:'var(--yellow)'}}>{payback>0?`${payback.toFixed(1)} años`:'—'}</div><div className="roi-label">Payback simple</div></div>
                      <div className="roi-stat"><div className="roi-value" style={{color:'var(--green)'}}>{rCov}%</div><div className="roi-label">Cobertura</div></div>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:8}}>
                      {[5,10,25].map(y=>(
                        <div key={y} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',background:'var(--card2)',borderRadius:9,border:'1px solid var(--border)'}}>
                          <span style={{fontSize:12,color:'var(--text2)'}}>En {y} años ahorrarías</span>
                          <span style={{fontSize:15,fontWeight:700,color:'var(--green)'}}>$ {fmt(ahAno*y,0)} ARS</span>
                        </div>
                      ))}
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',background:'var(--card2)',borderRadius:9,border:'1px solid var(--border)'}}>
                        <span style={{fontSize:12,color:'var(--text2)'}}>ROI a 10 años</span>
                        <span style={{fontSize:15,fontWeight:700,color:((ahAno*10-rARS)/rARS*100)>0?'var(--green)':'var(--red)'}}>
                          {fmt(((ahAno*10-rARS)/rARS*100),0)}%
                        </span>
                      </div>
                    </div>
                    <div style={{marginTop:14,padding:'10px 14px',background:'rgba(77,123,255,0.06)',border:'1px solid rgba(77,123,255,0.15)',borderRadius:10,fontSize:12,color:'var(--text2)',lineHeight:1.6}}>
                      💡 Con inflación tarifaria del <strong style={{color:'var(--text)'}}>{tna}%</strong> anual, el ahorro real crece cada año. El solar protege contra aumentos de tarifas.
                    </div>
                  </>
                ):(
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'200px',color:'var(--text3)',gap:10}}>
                    <div style={{fontSize:32}}>💰</div><div style={{fontSize:13,textAlign:'center'}}>Ingresá el importe de tu factura para ver la proyección</div>
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

        {/* BILL ANALYSIS */}
        {tab==='bill'&&(
          <div className="fade-in" style={{maxWidth:920,margin:'0 auto'}}>
            {billData?(
              <div className="card">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
                  <div>
                    <div style={{fontSize:16,fontWeight:700}}>{billData.empresa||'Distribuidora'}</div>
                    <div style={{display:'flex',gap:6,marginTop:6,flexWrap:'wrap'}}>
                      {billData.tipoUsuario&&<span className="badge badge-orange">{billData.tipoUsuario}</span>}
                      {billData.periodo&&<span className="badge badge-blue">{billData.periodo}</span>}
                      {billData.tieneDesglosoHorario?<span className="badge badge-purple">⏱ Con desglose horario</span>:<span className="badge badge-gray">📋 Sin desglose horario</span>}
                    </div>
                  </div>
                  <span className="badge badge-accent"><IC.spark/> Lectura IA</span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:20}}>
                  <div className="bill-block" style={{border:'1px solid rgba(77,123,255,0.25)'}}>
                    <div className="bill-label">TOTAL consumo</div>
                    <div className="bill-value" style={{color:'var(--accent)',fontSize:28}}>{billData.totalKwh}</div>
                    <div className="bill-sub">kWh · {billData.diasPeriodo||30} días · {fmt(billData.promedioDiarioKwh||billData.totalKwh/30,1)} kWh/día</div>
                  </div>
                  {billData.tieneDesglosoHorario?(
                    <>
                      {billData.picoKwh&&<div className="bill-block"><div className="bill-label">🌞 Pico</div><div className="bill-value" style={{color:'var(--red)'}}>{billData.picoKwh}</div><div className="bill-sub">kWh · {fmt(billData.picoKwh/billData.totalKwh*100,0)}%</div></div>}
                      {billData.valleKwh&&<div className="bill-block"><div className="bill-label">🌙 Valle</div><div className="bill-value" style={{color:'var(--accent2)'}}>{billData.valleKwh}</div><div className="bill-sub">kWh · {fmt(billData.valleKwh/billData.totalKwh*100,0)}%</div></div>}
                      {billData.restoKwh&&<div className="bill-block"><div className="bill-label">🌤️ Resto</div><div className="bill-value" style={{color:'var(--yellow)'}}>{billData.restoKwh}</div><div className="bill-sub">kWh · {fmt(billData.restoKwh/billData.totalKwh*100,0)}%</div></div>}
                    </>
                  ):(
                    <div className="bill-block" style={{gridColumn:'span 2'}}>
                      <div className="bill-label">Tipo de medición</div>
                      <div style={{fontSize:13,color:'var(--text2)',marginTop:4,lineHeight:1.6}}>Tarifa <strong style={{color:'var(--text)'}}>sin segmentación horaria</strong> (común en residencial T1/R1). El sistema solar cubrirá el consumo diurno de forma proporcional.</div>
                    </div>
                  )}
                  {billData.importeTotal&&<div className="bill-block"><div className="bill-label">💵 Importe</div><div className="bill-value" style={{color:'var(--accent3)'}}>$ {fmt(billData.importeTotal,0)}</div><div className="bill-sub">ARS</div></div>}
                  {billData.potenciaContratadaKw&&<div className="bill-block"><div className="bill-label">⚡ Potencia contratada</div><div className="bill-value">{billData.potenciaContratadaKw} <span style={{fontSize:12,fontWeight:400,color:'var(--text2)'}}>kW</span></div></div>}
                </div>
                {billData.tieneDesglosoHorario&&opt&&(
                  <div style={{background:'var(--card2)',borderRadius:12,padding:16,border:'1px solid var(--border)',marginBottom:16}}>
                    <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Cobertura solar por horario</div>
                    <div style={{fontSize:12,color:'var(--text2)',marginBottom:12,lineHeight:1.6}}>
                      El solar genera principalmente en <strong style={{color:'var(--yellow)'}}>horario diurno (pico y resto)</strong>. El <strong style={{color:'var(--accent2)'}}>valle nocturno</strong> se cubre con la red o con batería en sistemas híbridos.
                    </div>
                    {[{l:'Pico',kwh:billData.picoKwh,color:'var(--red)',diurno:true,note:'Mayor costo tarifario — solar lo cubre en horario diurno'},
                      {l:'Resto',kwh:billData.restoKwh,color:'var(--yellow)',diurno:true,note:'Horario diurno estándar — cobertura solar máxima'},
                      {l:'Valle',kwh:billData.valleKwh,color:'var(--accent2)',diurno:false,note:'Nocturno — cubierto con batería (híbrido) o red (on-grid)'}
                    ].filter(x=>x.kwh).map(x=>{
                      const frac=x.kwh/billData.totalKwh;
                      const sg=x.diurno?gOpt*frac*1.15:sysMode!=='ongrid'?gOpt*frac*.3:0;
                      const c2=Math.min(100,Math.round((sg/x.kwh)*100));
                      return(
                        <div key={x.l} style={{marginBottom:12}}>
                          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                            <span style={{fontSize:12,fontWeight:600,color:x.color}}>{x.l} — {x.kwh} kWh</span>
                            <span style={{fontSize:11,color:'var(--text2)'}}>Cobertura solar: <strong style={{color:x.color}}>{c2}%</strong></span>
                          </div>
                          <div className="coverage-bar" style={{height:6}}><div className="coverage-fill" style={{width:`${c2}%`,background:x.color}}/></div>
                          <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>{x.note}</div>
                        </div>
                      );
                    })}
                  </div>
                )}
                {billData.observaciones&&<div style={{fontSize:12,color:'var(--text2)',background:'var(--card)',borderRadius:8,padding:'10px 12px',border:'1px solid var(--border)',lineHeight:1.6}}><span style={{fontWeight:600,color:'var(--text3)'}}>📝 </span>{billData.observaciones}</div>}
              </div>
            ):(
              <div className="card" style={{textAlign:'center',padding:'52px 24px'}}>
                <div style={{fontSize:36,marginBottom:14}}>📄</div>
                <div style={{fontSize:15,fontWeight:600,marginBottom:8}}>No hay factura cargada</div>
                <div style={{fontSize:13,color:'var(--text2)',marginBottom:20}}>Volvé al paso 1 y subí tu factura para ver el análisis tarifario.</div>
                <button className="btn btn-secondary" onClick={onBack}>← Volver al inicio</button>
              </div>
            )}
          </div>
        )}

        {/* BOM */}
        {tab==='bom'&&(
          <div className="fade-in" style={{maxWidth:920,margin:'0 auto'}}>
            <div className="grid-2" style={{gap:20}}>
              {[{kit:opt,l:'Recomendado',color:'var(--accent)',extra:extraOpt},{kit:rob,l:'Opción Robusta',color:'var(--accent2)',extra:extraRob}].map(({kit:k,l,color,extra})=>{
                if(!k) return <div key={l}/>;
                const st=k.str[roof]||k.str.chapa;
                const cs=Math.ceil(k.panels/8);
                const totalBat=k.bat+(extra*BAT_KWH);
                const batQ=k.bat>0?Math.round(totalBat/BAT_KWH):0;
                const isHV=(k.batModel||'').includes('HV');
                const extraCost=extra*batPrice;
                const totalP=k.price+extraCost;
                const items=[
                  {qty:k.panels,u:'u.',n:'Panel Solar TCL 585W TopCon Bifacial',code:'TCL-MI585DH182-72NT'},
                  {qty:1,u:'u.',n:`Inversor ${k.inv}`,code:k.inv.split(' ')[1]||''},
                  {qty:cs,u:'set',n:'Cables + Conectores DC',code:'CC-20'},
                  {qty:1,u:'u.',n:`Smart Energy Controller ${phase==='tri'?'Trifásico':'Monofásico'}`,code:phase==='tri'?'GMK330':'GMK110'},
                ];
                if(k.bat>0){
                  items.push({qty:batQ,u:'u.',n:`Módulo Batería 5kWh ${isHV?'HV':'LV'}${extra>0?` (+${extra} adicional${extra>1?'es':''})`:' '}`,code:isHV?'LX-D5.0-10':'LX-U5.0-30'});
                  if(isHV) items.push({qty:1,u:'u.',n:'PCU – Controlador HV',code:'PCU-HV'});
                  items.push({qty:1,u:'set',n:'Cables de Batería',code:'CB-SET'});
                }
                items.push({qty:1,u:'set',n:`Estructura ${st} (${roof})`,code:st});
                return(
                  <div key={l} className="card">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
                      <div>
                        <span className={`badge ${color==='var(--accent)'?'badge-accent':'badge-blue'}`}>{l}</span>
                        <div style={{fontSize:16,fontWeight:700,marginTop:6}}>{k.name}</div>
                        {extra>0&&<div style={{fontSize:11,color:'#FBBF24',marginTop:2}}>+{extra} batería{extra>1?'s':''} adicional{extra>1?'es':''}</div>}
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:18,fontWeight:800,color}}>{fmtUSD(totalP)}</div>
                        {extra>0&&<div style={{fontSize:11,color:'var(--text3)',textDecoration:'line-through'}}>{fmtUSD(k.price)}</div>}
                        <div style={{fontSize:10,color:'var(--text3)'}}>+ IVA</div>
                      </div>
                    </div>
                    <div style={{background:'var(--card2)',borderRadius:10,overflow:'hidden',border:'1px solid var(--border)'}}>
                      <div style={{display:'grid',gridTemplateColumns:'36px 1fr 90px',padding:'7px 12px',borderBottom:'1px solid var(--border)',fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.04em',fontWeight:600}}>
                        <span>Cant.</span><span>Componente</span><span>Código</span>
                      </div>
                      {items.map((it,i)=>(
                        <div key={i} className="bom-row">
                          <div style={{fontWeight:700,color}}>{it.qty}<span style={{fontSize:10,color:'var(--text3)',fontWeight:400}}> {it.u}</span></div>
                          <div style={{fontSize:12,fontWeight:500}}>{it.n}</div>
                          <div style={{fontSize:10,color:'var(--text3)',fontFamily:'monospace'}}>{it.code}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{marginTop:14,padding:'10px 12px',background:`${color}08`,border:`1px solid ${color}20`,borderRadius:10,fontSize:12,color:'var(--text2)'}}>
                      {totalBat>0&&(()=>{const aH2=autoHours(totalBat,kwhMes);const aS2=fmtAuto(aH2);return <div style={{marginBottom:8}}>🔋 Banco total: <strong style={{color:'var(--text)'}}>{totalBat} kWh</strong>{aS2&&<> · Autonomía: <strong style={{color:'#FBBF24'}}>~{aS2}</strong> a plena carga</>}</div>})()}
                      ✉️ <strong style={{color:'var(--text)'}}>info@rvenergia.com.ar</strong> · +54 (11) 5140-6628
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Footer */}
        <div style={{marginTop:32,textAlign:'center',borderTop:'1px solid var(--border)',paddingTop:24}}>
          <div style={{fontSize:13,color:'var(--text2)',marginBottom:14}}>¿Querés una cotización formal o tenés dudas técnicas?</div>
          <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
            <a href="https://wa.me/5401151406628" target="_blank" rel="noopener" style={{textDecoration:'none'}}>
              <button className="btn btn-primary" style={{background:'#25D366'}}>💬 WhatsApp</button>
            </a>
            <a href="mailto:info@rvenergia.com.ar" style={{textDecoration:'none'}}>
              <button className="btn btn-secondary">✉️ info@rvenergia.com.ar</button>
            </a>
            <a href="https://www.rvenergia.com.ar" target="_blank" rel="noopener" style={{textDecoration:'none'}}>
              <button className="btn btn-ghost">🌐 www.rvenergia.com.ar</button>
            </a>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
